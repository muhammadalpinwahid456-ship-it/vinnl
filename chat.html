<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIN Chat</title>
    <link rel="stylesheet" href="chat.style.css">
</head>
<body>
    <!-- AUTH CHECK -->
    <div id="authCheck" class="auth-check">
        <div class="auth-message">
            <h2>⚠️ Silakan Login Terlebih Dahulu</h2>
            <p>Anda harus login untuk mengakses fitur chat</p>
            <button onclick="window.location.href='index.html'">Kembali ke Homepage</button>
        </div>
    </div>

    <!-- CHAT CONTAINER -->
    <div id="chatContainer" class="chat-container" style="display: none;">
        <!-- HEADER -->
       <header class="chat-header">
    <div class="header-left">
        <h1 class="logo">💬 ALVIN Chat</h1>
    </div>
    <div class="header-right">
        <input type="file" id="profileUpload" accept="image/*">
        <img id="myAvatar" src="https://via.placeholder.com/40" class="user-avatar" title="Klik untuk ganti foto">
        <span class="user-name" id="currentUserName">User</span>
        <button class="btn-logout-chat" onclick="logoutChat()">Logout</button>
    </div>
</header>

        <div class="chat-wrapper">
            <!-- SIDEBAR -->
            <div class="chat-sidebar">
                <div class="sidebar-header">
                    <h3>Pesan</h3>
                    <button class="btn-new-chat" onclick="openNewChat()">➕</button>
                </div>

                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchUsers" 
                        placeholder="Cari pengguna..." 
                        onkeyup="searchUsers()"
                    >
                </div>

                <div class="users-list" id="usersList">
                    <!-- User list akan di-populate di sini -->
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-main">
                <!-- Welcome Message -->
                <div id="welcomeMessage" class="welcome-message">
                    <div class="welcome-content">
                        <h2>👋 Selamat Datang di ALVIN Chat</h2>
                        <p>Pilih pengguna dari sidebar untuk mulai percakapan</p>
                        <p style="font-size: 0.9rem; color: #999; margin-top: 1rem;">💡 Tips: Klik pengguna atau tekan tombol ➕ untuk chat baru</p>
                    </div>
                </div>

                <!-- Chat Window -->
                <div id="chatWindow" class="chat-window" style="display: none;">
                    <!-- CHAT HEADER -->
                    <div class="chat-window-header">
                        <div class="user-info">
                            <div class="user-avatar" id="chatUserAvatar">👤</div>
                            <div class="user-details">
                                <h3 id="chatUserName">User</h3>
                                <span id="userStatus" class="user-status">online</span>
                            </div>
                        </div>
                        <button class="btn-close-chat" onclick="closeChat()">✕</button>
                    </div>

                    <!-- MESSAGES AREA -->
                    <div class="messages-area" id="messagesArea">
                        <!-- Messages akan ditampilkan di sini -->
                    </div>

                    <!-- INPUT AREA -->
                    <div class="input-area">
                        <input type="file" id="mediaInput" accept="image/*,video/*" style="display: none;">
                        <button class="btn-attachment" onclick="document.getElementById('mediaInput').click()" title="Attach Media">📎</button>
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Ketik pesan..." 
                            onkeypress="handleKeyPress(event)"
                        >
                        <button class="btn-send" onclick="sendMessage()">Kirim</button>
                    </div>

                    <!-- MEDIA PREVIEW -->
                    <div id="mediaPreview" class="media-preview" style="display: none;">
                        <div class="media-preview-content">
                            <img id="previewImage" src="" alt="preview" style="display: none;">
                            <video id="previewVideo" style="display: none;" controls></video>
                            <button class="btn-cancel-media" onclick="cancelMediaPreview()">✕</button>
                        </div>
                    </div>

                    <!-- UPLOAD PROGRESS -->
                    <div id="uploadProgress" class="upload-progress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span id="progressText">Uploading... 0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MEDIA VIEWER MODAL -->
    <div id="mediaModal" class="media-modal" style="display: none;">
        <div class="media-modal-content">
            <button class="modal-close" onclick="closeMediaModal()">✕</button>
            <img id="modalImage" src="" alt="media" style="display: none;">
            <video id="modalVideo" controls style="display: none;"></video>
            <div class="modal-actions">
                <button class="btn-download" onclick="downloadMedia()">⬇️ Download</button>
            </div>
        </div>
    </div>

    <!-- MODAL NEW CHAT -->
    <div id="newChatModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="closeNewChat()">✕</button>
            <h2>Mulai Chat Baru</h2>
            
            <div class="modal-search">
                <input 
                    type="text" 
                    id="modalSearchUsers" 
                    placeholder="Cari pengguna..." 
                    onkeyup="searchModalUsers()"
                >
            </div>

            <div class="modal-users-list" id="modalUsersList">
                <!-- User list akan di-populate di sini -->
            </div>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            onValue,
            push,
            get,
            set,
            update
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzDRaHEASBWO0dDKOIlvlku3lN01b89iw",
            authDomain: "alvin-f573e.firebaseapp.com",
            projectId: "alvin-f573e",
            storageBucket: "alvin-f573e.firebasestorage.app",
            messagingSenderId: "718704784181",
            appId: "1:718704784181:web:db5fe912a3cb3b0675d27c",
            measurementId: "G-NHLWBMV307",
            databaseURL: "https://alvin-f573e-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentUser = null;
        let selectedUserId = null;
        let allUsers = [];
        let currentUserName = '';
        let messagesUnsubscribe = null;
        let unreadCounts = {};
        let usersUnsubscribeList = [];
        let selectedMediaFile = null;
        let currentMediaUrl = null;
        let currentMediaType = null;

        // ===== CLOUDINARY CONFIG =====
        const CLOUDINARY_CLOUD_NAME = "djc9oemca";
        const CLOUDINARY_UPLOAD_PRESET = "chat_upload_preset";

        // ===== HELPER FUNCTIONS =====
        function generateChatId(userId1, userId2) {
            const ids = [userId1, userId2].sort();
            return `${ids[0]}_${ids[1]}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== UPDATE UNREAD COUNT =====
        function updateUnreadCount(userId, count) {
            unreadCounts[userId] = count;
            updateUserItemBadge(userId, count);
            updateModalUserBadge(userId, count);
            updateBrowserTitle();
        }

        function updateUserItemBadge(userId, count) {
            const userItem = document.querySelector(`[data-user-id="${userId}"]`);
            if (userItem) {
                let badge = userItem.querySelector('.unread-badge');
                if (count > 0) {
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'unread-badge';
                        userItem.appendChild(badge);
                    }
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.style.display = 'block';
                } else if (badge) {
                    badge.style.display = 'none';
                }
            }
        }

        function updateModalUserBadge(userId, count) {
            const modalUserItem = document.querySelector(`.modal-user-item[data-user-id="${userId}"]`);
            if (modalUserItem) {
                let badge = modalUserItem.querySelector('.unread-badge');
                if (count > 0) {
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'unread-badge';
                        modalUserItem.appendChild(badge);
                    }
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.style.display = 'block';
                } else if (badge) {
                    badge.style.display = 'none';
                }
            }
        }

        function updateBrowserTitle() {
            const totalUnread = Object.values(unreadCounts).reduce((sum, count) => sum + count, 0);
            if (totalUnread > 0) {
                document.title = `(${totalUnread}) 💬 ALVIN Chat`;
            } else {
                document.title = '💬 ALVIN Chat';
            }
        }

        // ===== PROFILE PHOTO UPLOAD =====
        document.getElementById('myAvatar').onclick = () => {
            document.getElementById('profileUpload').click();
        };

        document.getElementById('profileUpload').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ Ukuran file terlalu besar (max 5MB)');
                    return;
                }

                if (!file.type.startsWith('image/')) {
                    alert('❌ File harus berupa gambar');
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const base64Image = event.target.result;
                        document.getElementById('myAvatar').src = base64Image;
                        const userRef = ref(database, 'users/' + currentUser.uid);
                        await update(userRef, { photoURL: base64Image });
                        console.log('✅ Foto profil berhasil diperbarui');
                    } catch (error) {
                        console.error('❌ Error uploading photo:', error);
                        alert('❌ Gagal mengupload foto: ' + error.message);
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        // ===== MEDIA INPUT HANDLER =====
        document.getElementById('mediaInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const maxSize = file.type.startsWith('video/') ? 100 * 1024 * 1024 : 10 * 1024 * 1024;
                
                if (file.size > maxSize) {
                    alert(`❌ File terlalu besar! Max: ${file.type.startsWith('video/') ? '100MB' : '10MB'}`);
                    document.getElementById('mediaInput').value = '';
                    return;
                }

                selectedMediaFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('mediaPreview');
                    const previewImage = document.getElementById('previewImage');
                    const previewVideo = document.getElementById('previewVideo');

                    if (file.type.startsWith('image/')) {
                        previewImage.src = event.target.result;
                        previewImage.style.display = 'block';
                        previewVideo.style.display = 'none';
                    } else if (file.type.startsWith('video/')) {
                        previewVideo.src = event.target.result;
                        previewVideo.style.display = 'block';
                        previewImage.style.display = 'none';
                    }

                    preview.style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== CANCEL MEDIA PREVIEW =====
        window.cancelMediaPreview = function() {
            selectedMediaFile = null;
            document.getElementById('mediaPreview').style.display = 'none';
            document.getElementById('mediaInput').value = '';
        };

        // ===== UPLOAD TO CLOUDINARY =====
        async function uploadToCloudinary(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('cloud_name', CLOUDINARY_CLOUD_NAME);

                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('progressFill').style.width = percentComplete + '%';
                        document.getElementById('progressText').textContent = `Uploading... ${percentComplete}%`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        resolve({
                            url: response.secure_url,
                            publicId: response.public_id,
                            type: file.type.startsWith('video/') ? 'video' : 'image'
                        });
                    } else {
                        reject(new Error(`Upload failed with status ${xhr.status}`));
                    }
                });

                xhr.addEventListener('error', () => {
                    reject(new Error('Upload error'));
                });

                xhr.addEventListener('abort', () => {
                    reject(new Error('Upload aborted'));
                });

                const uploadUrl = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`;
                xhr.open('POST', uploadUrl);
                xhr.send(formData);
            });
        }

        // ===== AUTH CHECK =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log('✅ User logged in:', user.email);
                document.getElementById('authCheck').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                loadCurrentUser();
                loadAllUsers();
            } else {
                console.log('❌ User not logged in');
                document.getElementById('authCheck').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        // Load current user data
        function loadCurrentUser() {
            const userRef = ref(database, 'users/' + currentUser.uid);
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    currentUserName = userData.fullname || userData.email.split('@')[0];
                    document.getElementById('currentUserName').textContent = currentUserName;
                    
                    if (userData.photoURL) {
                        document.getElementById('myAvatar').src = userData.photoURL;
                    }
                    
                    console.log('✅ Current user loaded:', currentUserName);
                } else {
                    currentUserName = currentUser.displayName || currentUser.email.split('@')[0];
                    document.getElementById('currentUserName').textContent = currentUserName;
                    
                    set(userRef, {
                        fullname: currentUserName,
                        email: currentUser.email,
                        createdAt: new Date().toISOString(),
                        photoURL: 'https://via.placeholder.com/40'
                    }).catch(err => console.error('Error saving user:', err));
                }
            }, (error) => {
                console.error('❌ Error loading current user:', error);
            });
        }

        // Load semua user
        function loadAllUsers() {
            const usersRef = ref(database, 'users');
            onValue(usersRef, (snapshot) => {
                allUsers = [];
                usersUnsubscribeList.forEach(unsub => unsub());
                usersUnsubscribeList = [];
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const userId = childSnapshot.key;
                        if (userId !== currentUser.uid) {
                            const userData = childSnapshot.val();
                            if (userData && userData.fullname) {
                                allUsers.push({
                                    uid: userId,
                                    name: userData.fullname,
                                    email: userData.email,
                                    photoURL: userData.photoURL || 'https://via.placeholder.com/40'
                                });
                                
                                setupUnreadListener(userId);
                            }
                        }
                    });
                    console.log('✅ Users loaded:', allUsers.length);
                } else {
                    console.log('ℹ️ No users found in database');
                }
                displayUsers();
            }, (error) => {
                console.error('❌ Error loading users:', error);
                alert('Error memuat pengguna: ' + error.message);
            });
        }

        function setupUnreadListener(userId) {
            const chatId = generateChatId(currentUser.uid, userId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);
            
            const unsubscribe = onValue(messagesRef, (snapshot) => {
                let unreadCount = 0;
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.senderId !== currentUser.uid && !msg.isRead) {
                            unreadCount++;
                        }
                    });
                }
                updateUnreadCount(userId, unreadCount);
            }, (error) => {
                console.error(`Error listening to messages for ${userId}:`, error);
            });
            
            usersUnsubscribeList.push(unsubscribe);
        }

        // Display users di sidebar
        function displayUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            if (allUsers.length === 0) {
                usersList.innerHTML = '<p class="no-users">Belum ada pengguna lain</p>';
                return;
            }

            allUsers.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => selectUser(user.uid, user.name, user.photoURL);
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p class="user-email">${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                usersList.appendChild(userElement);
            });
        }

        // Select user untuk chat
        window.selectUser = function(userId, userName, photoURL) {
            selectedUserId = userId;
            document.getElementById('chatUserName').textContent = escapeHtml(userName);
            const chatUserAvatar = document.getElementById('chatUserAvatar');
            chatUserAvatar.innerHTML = '';
            const img = document.createElement('img');
            img.src = photoURL || 'https://via.placeholder.com/40';
            img.style.cssText = 'width: 100%; height: 100%; border-radius: 50%; object-fit: cover;';
            chatUserAvatar.appendChild(img);
            document.getElementById('userStatus').textContent = 'online';
            document.getElementById('welcomeMessage').style.display = 'none';
            document.getElementById('chatWindow').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '';
            cancelMediaPreview();
            loadMessages();
            markAsRead(generateChatId(currentUser.uid, selectedUserId));
            updateUnreadCount(userId, 0);
            updateBrowserTitle();
        };

        // Load messages
        function loadMessages() {
            if (!selectedUserId || !currentUser) {
                console.error('❌ Missing selectedUserId or currentUser');
                return;
            }

            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }

            const chatId = generateChatId(currentUser.uid, selectedUserId);
            console.log('📧 Loading messages for chat:', chatId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);

            messagesUnsubscribe = onValue(messagesRef, (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';

                let messages = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        messages.push({
                            key: childSnapshot.key,
                            ...childSnapshot.val()
                        });
                    });
                }

                messages.sort((a, b) => a.timestamp - b.timestamp);

                if (messages.length === 0) {
                    messagesArea.innerHTML = '<p class="no-messages" style="text-align:center; color:#999; padding:2rem;">Belum ada pesan. Mulai percakapan!</p>';
                } else {
                    messages.forEach(msg => {
                        const messageElement = document.createElement('div');
                        messageElement.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                        
                        const timeStr = formatTime(msg.timestamp);
                        
                        let contentHtml = '';
                        
                        if (msg.mediaUrl && msg.mediaType) {
                            // Media message
                            if (msg.mediaType === 'image') {
                                contentHtml = `
                                    <div class="media-message" onclick="openMediaModal('${msg.mediaUrl}', 'image')">
                                        <img src="${msg.mediaUrl}" alt="image" style="max-width: 250px; border-radius: 8px; cursor: pointer;">
                                    </div>
                                `;
                            } else if (msg.mediaType === 'video') {
                                contentHtml = `
                                    <div class="media-message" onclick="openMediaModal('${msg.mediaUrl}', 'video')">
                                        <video src="${msg.mediaUrl}" style="max-width: 250px; border-radius: 8px; cursor: pointer;" onmouseover="this.controls=true" onmouseout="this.controls=false"></video>
                                    </div>
                                `;
                            }
                            if (msg.text) {
                                contentHtml += `<p style="margin-top: 8px;">${escapeHtml(msg.text)}</p>`;
                            }
                        } else {
                            // Text message
                            contentHtml = `<p>${escapeHtml(msg.text)}</p>`;
                        }
                        
                        let statusHtml = '';
                        if (msg.senderId === currentUser.uid) {
                            statusHtml = `<span class="message-status"><span class="tick ${msg.isRead ? 'read' : ''}">✔✔</span></span>`;
                        }
                        
                        messageElement.innerHTML = `
                            <div class="message-bubble">
                                ${contentHtml}
                                <span class="message-time">
                                    ${timeStr}
                                    ${statusHtml}
                                </span>
                            </div>
                        `;
                        messagesArea.appendChild(messageElement);
                    });

                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }
            }, (error) => {
                console.error('❌ Error loading messages:', error);
                alert('Error memuat pesan: ' + error.message);
            });
        }

        // Send message
        window.sendMessage = async function() {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();

            if (!selectedMediaFile && !text) {
                console.warn('⚠️ Message is empty');
                return;
            }

            if (!selectedUserId || !currentUser) {
                alert('❌ Error: User tidak terpilih');
                return;
            }

            const chatId = generateChatId(currentUser.uid, selectedUserId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);

            const messageData = {
                senderId: currentUser.uid,
                senderName: currentUserName,
                text: text,
                timestamp: Date.now(),
                isRead: false
            };

            try {
                if (selectedMediaFile) {
                    document.getElementById('uploadProgress').style.display = 'flex';
                    
                    const uploadResult = await uploadToCloudinary(selectedMediaFile);
                    messageData.mediaUrl = uploadResult.url;
                    messageData.mediaType = uploadResult.type;
                    
                    console.log('✅ Media uploaded:', uploadResult.type);
                    
                    document.getElementById('uploadProgress').style.display = 'none';
                }

                await push(messagesRef, messageData);
                
                console.log('✅ Message sent successfully');
                messageInput.value = '';
                messageInput.focus();
                cancelMediaPreview();
                
            } catch (error) {
                console.error('❌ Error sending message:', error);
                alert('❌ Gagal mengirim pesan: ' + error.message);
                document.getElementById('uploadProgress').style.display = 'none';
            }
        };

        // Handle Enter key
        window.handleKeyPress = function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        };

        // Media modal functions
        window.openMediaModal = function(url, type) {
            const modal = document.getElementById('mediaModal');
            const modalImage = document.getElementById('modalImage');
            const modalVideo = document.getElementById('modalVideo');

            currentMediaUrl = url;
            currentMediaType = type;

            if (type === 'image') {
                modalImage.src = url;
                modalImage.style.display = 'block';
                modalVideo.style.display = 'none';
            } else if (type === 'video') {
                modalVideo.src = url;
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
            }

            modal.style.display = 'flex';
        };

        window.closeMediaModal = function() {
            document.getElementById('mediaModal').style.display = 'none';
            currentMediaUrl = null;
            currentMediaType = null;
        };

        window.downloadMedia = function() {
            if (!currentMediaUrl) {
                alert('❌ Media tidak ditemukan');
                return;
            }

            const a = document.createElement('a');
            a.href = currentMediaUrl;
            a.download = `media_${Date.now()}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            console.log('✅ Media downloaded');
        };

        // Mark messages as read
        function markAsRead(chatId) {
            const messagesRef = ref(database, `chats/${chatId}/messages`);
            get(messagesRef).then((snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.senderId !== currentUser.uid && !msg.isRead) {
                            update(ref(database, `chats/${chatId}/messages/${child.key}`), { isRead: true });
                        }
                    });
                }
            }).catch(err => console.error('❌ Error marking as read:', err));
        }

        // Close chat
        window.closeChat = function() {
            selectedUserId = null;
            if (messagesUnsubscribe) {
                messagesUnsubscribe();
                messagesUnsubscribe = null;
            }
            cancelMediaPreview();
            document.getElementById('chatWindow').style.display = 'none';
            document.getElementById('welcomeMessage').style.display = 'flex';
            document.getElementById('messageInput').value = '';
            updateBrowserTitle();
        };

        // Search users
        window.searchUsers = function() {
            const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            const filtered = allUsers.filter(user =>
                user.name.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                usersList.innerHTML = '<p class="no-users">Tidak ada pengguna yang cocok</p>';
                return;
            }

            filtered.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => selectUser(user.uid, user.name, user.photoURL);
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p class="user-email">${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                usersList.appendChild(userElement);
            });
        };

        // Open new chat modal
        window.openNewChat = function() {
            document.getElementById('newChatModal').classList.add('show');
            populateModalUsers();
        };

        // Close new chat modal
        window.closeNewChat = function() {
            document.getElementById('newChatModal').classList.remove('show');
            document.getElementById('modalSearchUsers').value = '';
        };

        // Populate modal users
        function populateModalUsers() {
            const modalUsersList = document.getElementById('modalUsersList');
            modalUsersList.innerHTML = '';

            if (allUsers.length === 0) {
                modalUsersList.innerHTML = '<p class="no-users">Belum ada pengguna lain</p>';
                return;
            }

            allUsers.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'modal-user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => {
                    selectUser(user.uid, user.name, user.photoURL);
                    closeNewChat();
                };
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p>${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                modalUsersList.appendChild(userElement);
            });
        }

        // Search modal users
        window.searchModalUsers = function() {
            const searchTerm = document.getElementById('modalSearchUsers').value.toLowerCase();
            const modalUsersList = document.getElementById('modalUsersList');
            modalUsersList.innerHTML = '';

            const filtered = allUsers.filter(user =>
                user.name.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                modalUsersList.innerHTML = '<p class="no-users">Tidak ada pengguna yang cocok</p>';
                return;
            }

            filtered.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'modal-user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => {
                    selectUser(user.uid, user.name, user.photoURL);
                    closeNewChat();
                };
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p>${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                modalUsersList.appendChild(userElement);
            });
        };

        // Logout
        window.logoutChat = function() {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                if (messagesUnsubscribe) {
                    messagesUnsubscribe();
                }
                usersUnsubscribeList.forEach(unsub => unsub());
                usersUnsubscribeList = [];
                
                signOut(auth).then(() => {
                    window.location.href = 'index.html';
                }).catch((error) => {
                    console.error('❌ Error saat logout:', error);
                    alert('❌ Error saat logout: ' + error.message);
                });
            }
        };

        window.onclick = function(event) {
            const modal = document.getElementById('newChatModal');
            if (event.target === modal) {
                closeNewChat();
            }
            const mediaModal = document.getElementById('mediaModal');
            if (event.target === mediaModal) {
                closeMediaModal();
            }
        };

    </script>
</body>
</html>
