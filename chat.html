<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIN Chat</title>
    <link rel="stylesheet" href="chat.style.css">
</head>
<body>
    <!-- AUTH CHECK -->
    <div id="authCheck" class="auth-check">
        <div class="auth-message">
            <h2>⚠️ Silakan Login Terlebih Dahulu</h2>
            <p>Anda harus login untuk mengakses fitur chat</p>
            <button onclick="window.location.href='index.html'">Kembali ke Homepage</button>
        </div>
    </div>

    <!-- CHAT CONTAINER -->
    <div id="chatContainer" class="chat-container" style="display: none;">
        <!-- HEADER -->
       <header class="chat-header">
    <div class="header-left">
        <h1 class="logo">💬 ALVIN Chat</h1>
    </div>
    <div class="header-right">
        <input type="file" id="profileUpload" accept="image/*">
        <img id="myAvatar" src="https://via.placeholder.com/40" class="user-avatar" title="Klik untuk ganti foto">
        <span class="user-name" id="currentUserName">User</span>
        <button class="btn-logout-chat" onclick="logoutChat()">Logout</button>
    </div>
</header>

        <div class="chat-wrapper">
            <!-- SIDEBAR -->
            <div class="chat-sidebar">
                <div class="sidebar-header">
                    <h3>Pesan</h3>
                    <button class="btn-new-chat" onclick="openNewChat()">➕</button>
                </div>

                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchUsers" 
                        placeholder="Cari pengguna..." 
                        onkeyup="searchUsers()"
                    >
                </div>

                <div class="users-list" id="usersList">
                    <!-- User list akan di-populate di sini -->
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-main">
                <!-- Welcome Message -->
                <div id="welcomeMessage" class="welcome-message">
                    <div class="welcome-content">
                        <h2>👋 Selamat Datang di ALVIN Chat</h2>
                        <p>Pilih pengguna dari sidebar untuk mulai percakapan</p>
                        <p style="font-size: 0.9rem; color: #999; margin-top: 1rem;">💡 Tips: Klik pengguna atau tekan tombol ➕ untuk chat baru</p>
                    </div>
                </div>

                <!-- Chat Window -->
                <div id="chatWindow" class="chat-window" style="display: none;">
                    <!-- CHAT HEADER -->
                    <div class="chat-window-header">
                        <div class="user-info">
                            <div class="user-avatar" id="chatUserAvatar">👤</div>
                            <div class="user-details">
                                <h3 id="chatUserName">User</h3>
                                <span id="userStatus" class="user-status">online</span>
                            </div>
                        </div>
                        <button class="btn-close-chat" onclick="closeChat()">✕</button>
                    </div>

                    <!-- MESSAGES AREA -->
                    <div class="messages-area" id="messagesArea">
                        <!-- Messages akan ditampilkan di sini -->
                    </div>

                    <!-- INPUT AREA -->
                    <div class="input-area">
                        <!-- Media Upload Buttons -->
                        <div class="media-upload-section">
                            <label class="media-btn" title="Kirim Foto" onclick="openMediaPicker('image')">
                                <span>📷</span>
                                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleMediaSelect(event)">
                            </label>
                            <label class="media-btn" title="Kirim Video" onclick="openMediaPicker('video')">
                                <span>🎥</span>
                                <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleMediaSelect(event)">
                            </label>
                        </div>

                        <!-- Media Preview (sebelum dikirim) -->
                        <div id="mediaPreviewContainer" class="media-preview-container" style="display: none;">
                            <div class="media-preview-box">
                                <div id="mediaPreview" class="media-preview"></div>
                                <div class="preview-caption">
                                    <input 
                                        type="text" 
                                        id="mediaCaptionInput" 
                                        placeholder="Tambah caption..." 
                                        maxlength="200"
                                    >
                                </div>
                                <div class="preview-actions">
                                    <button class="btn-cancel" onclick="cancelMediaPreview()">Batalkan</button>
                                    <button class="btn-send-media" onclick="sendMediaMessage()">Kirim</button>
                                </div>
                            </div>
                        </div>

                        <!-- Text Input (hidden when showing media preview) -->
                        <div id="textInputContainer" class="text-input-container">
                            <input 
                                type="text" 
                                id="messageInput" 
                                class="message-input" 
                                placeholder="Ketik pesan..." 
                                onkeypress="handleKeyPress(event)"
                            >
                            <button class="btn-send" onclick="sendMessage()">Kirim</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL NEW CHAT -->
    <div id="newChatModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="closeNewChat()">✕</button>
            <h2>Mulai Chat Baru</h2>
            
            <div class="modal-search">
                <input 
                    type="text" 
                    id="modalSearchUsers" 
                    placeholder="Cari pengguna..." 
                    onkeyup="searchModalUsers()"
                >
            </div>

            <div class="modal-users-list" id="modalUsersList">
                <!-- User list akan di-populate di sini -->
            </div>
        </div>
    </div>

    <!-- MEDIA VIEWER MODAL -->
    <div id="mediaViewerModal" class="modal" style="display: none;">
        <div class="media-viewer-content">
            <button class="modal-close" onclick="closeMediaViewer()">✕</button>
            <div class="media-viewer-body">
                <img id="viewerImage" src="" alt="Media" style="display: none; max-width: 90vw; max-height: 90vh; object-fit: contain;">
                <video id="viewerVideo" controls style="display: none; max-width: 90vw; max-height: 90vh; object-fit: contain;"></video>
            </div>
            <div class="media-viewer-info">
                <p id="mediaViewerCaption" class="media-viewer-caption"></p>
                <button class="btn-download-media" onclick="downloadMedia()">📥 Download</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            onValue,
            push,
            get,
            set,
            update
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzDRaHEASBWO0dDKOIlvlku3lN01b89iw",
            authDomain: "alvin-f573e.firebaseapp.com",
            projectId: "alvin-f573e",
            storageBucket: "alvin-f573e.firebasestorage.app",
            messagingSenderId: "718704784181",
            appId: "1:718704784181:web:db5fe912a3cb3b0675d27c",
            measurementId: "G-NHLWBMV307",
            databaseURL: "https://alvin-f573e-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentUser = null;
        let selectedUserId = null;
        let allUsers = [];
        let currentUserName = '';
        let messagesUnsubscribe = null;
        let unreadCounts = {};
        let usersUnsubscribeList = [];
        let selectedMediaFile = null;
        let currentViewingMedia = null;

        // ===== CLOUDINARY CONFIG =====
        const CLOUDINARY_CLOUD_NAME = "djc9oemca";
        const CLOUDINARY_UPLOAD_PRESET = "chat_media_upload";

        // ===== HELPER FUNCTIONS =====
        function generateChatId(userId1, userId2) {
            const ids = [userId1, userId2].sort();
            return `${ids[0]}_${ids[1]}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== MEDIA UPLOAD TO CLOUDINARY =====
        async function uploadToCloudinary(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('cloud_name', CLOUDINARY_CLOUD_NAME);

                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        console.log(`Upload progress: ${percentComplete}%`);
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        resolve({
                            url: response.secure_url,
                            publicId: response.public_id,
                            type: file.type.startsWith('video/') ? 'video' : 'image'
                        });
                    } else {
                        reject(new Error('Upload failed'));
                    }
                });

                xhr.addEventListener('error', () => {
                    reject(new Error('Upload error'));
                });

                const uploadUrl = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`;
                xhr.open('POST', uploadUrl);
                xhr.send(formData);
            });
        }

        // ===== OPEN MEDIA PICKER =====
        window.openMediaPicker = function(type) {
            if (type === 'image') {
                document.getElementById('imageInput').click();
            } else if (type === 'video') {
                document.getElementById('videoInput').click();
            }
        };

        // ===== HANDLE MEDIA SELECT =====
        window.handleMediaSelect = async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file size
            const maxSize = file.type.startsWith('video/') ? 50 * 1024 * 1024 : 10 * 1024 * 1024;
            if (file.size > maxSize) {
                alert(`❌ File terlalu besar! Max: ${file.type.startsWith('video/') ? '50MB' : '10MB'}`);
                return;
            }

            selectedMediaFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewDiv = document.getElementById('mediaPreview');
                previewDiv.innerHTML = '';

                if (file.type.startsWith('image/')) {
                    previewDiv.innerHTML = `<img src="${e.target.result}" alt="preview" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else if (file.type.startsWith('video/')) {
                    previewDiv.innerHTML = `<video src="${e.target.result}" controls style="width: 100%; height: 100%; object-fit: cover;"></video>`;
                }

                // Show media preview container
                document.getElementById('mediaPreviewContainer').style.display = 'flex';
                document.getElementById('textInputContainer').style.display = 'none';
                document.getElementById('mediaCaptionInput').focus();
            };
            reader.readAsDataURL(file);

            // Reset input
            event.target.value = '';
        };

        // ===== CANCEL MEDIA PREVIEW =====
        window.cancelMediaPreview = function() {
            selectedMediaFile = null;
            document.getElementById('mediaPreviewContainer').style.display = 'none';
            document.getElementById('textInputContainer').style.display = 'flex';
            document.getElementById('messageInput').focus();
            document.getElementById('mediaCaptionInput').value = '';
        };

        // ===== SEND MEDIA MESSAGE =====
        window.sendMediaMessage = async function() {
            if (!selectedMediaFile || !selectedUserId || !currentUser) {
                alert('❌ Error: Data tidak lengkap');
                return;
            }

            const caption = document.getElementById('mediaCaptionInput').value.trim();
            const sendBtn = document.querySelector('.btn-send-media');
            
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ Mengirim...';

            try {
                // Upload ke Cloudinary
                console.log('📤 Uploading media to Cloudinary...');
                const uploadResult = await uploadToCloudinary(selectedMediaFile);

                // Buat chat ID
                const chatId = generateChatId(currentUser.uid, selectedUserId);
                const messagesRef = ref(database, `chats/${chatId}/messages`);

                // Prepare message data
                const messageData = {
                    senderId: currentUser.uid,
                    senderName: currentUserName,
                    text: caption || '(Media)',
                    mediaUrl: uploadResult.url,
                    mediaType: uploadResult.type,
                    mediaPublicId: uploadResult.publicId,
                    timestamp: Date.now(),
                    isRead: false,
                    isMedia: true
                };

                // Push ke database
                await push(messagesRef, messageData);

                console.log('✅ Media berhasil dikirim');
                cancelMediaPreview();
                
            } catch (error) {
                console.error('❌ Error sending media:', error);
                alert('❌ Gagal mengirim media: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Kirim';
            }
        };

        // ===== DISPLAY MEDIA MESSAGE =====
        function createMediaMessageElement(msg) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;

            const timeStr = formatTime(msg.timestamp);
            const isImage = msg.mediaType === 'image';
            const mediaHtml = isImage 
                ? `<img src="${msg.mediaUrl}" alt="image" class="message-media" onclick="openMediaViewer('${msg.mediaUrl}', '${msg.mediaType}', '${escapeHtml(msg.text)}')" style="cursor: pointer;">`
                : `<video src="${msg.mediaUrl}" class="message-media" onclick="openMediaViewer('${msg.mediaUrl}', '${msg.mediaType}', '${escapeHtml(msg.text)}')" style="cursor: pointer;"></video>`;

            let statusHtml = '';
            if (msg.senderId === currentUser.uid) {
                statusHtml = `<span class="message-status"><span class="tick ${msg.isRead ? 'read' : ''}">✔✔</span></span>`;
            }

            messageElement.innerHTML = `
                <div class="message-bubble media-message-bubble">
                    <div class="media-container">
                        ${mediaHtml}
                        ${msg.text && msg.text !== '(Media)' ? `<p class="media-caption">${escapeHtml(msg.text)}</p>` : ''}
                    </div>
                    <span class="message-time">
                        ${timeStr}
                        ${statusHtml}
                    </span>
                    <div class="media-actions">
                        <button class="btn-download-small" onclick="downloadMediaDirect('${msg.mediaUrl}', '${msg.mediaType}')" title="Download">📥</button>
                    </div>
                </div>
            `;

            return messageElement;
        }

        // ===== OPEN MEDIA VIEWER =====
        window.openMediaViewer = function(mediaUrl, mediaType, caption) {
            currentViewingMedia = { url: mediaUrl, type: mediaType, caption: caption };
            
            const modal = document.getElementById('mediaViewerModal');
            const viewerImage = document.getElementById('viewerImage');
            const viewerVideo = document.getElementById('viewerVideo');
            const captionElement = document.getElementById('mediaViewerCaption');

            viewerImage.style.display = 'none';
            viewerVideo.style.display = 'none';

            if (mediaType === 'image') {
                viewerImage.src = mediaUrl;
                viewerImage.style.display = 'block';
            } else if (mediaType === 'video') {
                viewerVideo.src = mediaUrl;
                viewerVideo.style.display = 'block';
            }

            captionElement.textContent = caption || '(Media)';
            modal.style.display = 'flex';
        };

        // ===== CLOSE MEDIA VIEWER =====
        window.closeMediaViewer = function() {
            document.getElementById('mediaViewerModal').style.display = 'none';
            const viewerVideo = document.getElementById('viewerVideo');
            if (viewerVideo) {
                viewerVideo.pause();
            }
        };

        // ===== DOWNLOAD MEDIA =====
        window.downloadMedia = function() {
            if (currentViewingMedia) {
                downloadMediaDirect(currentViewingMedia.url, currentViewingMedia.type);
            }
        };

        // ===== DOWNLOAD MEDIA DIRECT =====
        window.downloadMediaDirect = function(mediaUrl, mediaType) {
            const extension = mediaType === 'video' ? 'mp4' : 'jpg';
            const filename = `alvin-chat-${Date.now()}.${extension}`;

            const xhr = new XMLHttpRequest();
            xhr.responseType = 'blob';
            xhr.onload = () => {
                const blob = xhr.response;
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                console.log('✅ Media downloaded:', filename);
            };
            xhr.onerror = () => {
                alert('❌ Gagal mengunduh media');
            };
            xhr.open('GET', mediaUrl);
            xhr.send();
        };

        // ===== UPDATE UNREAD COUNT =====
        function updateUnreadCount(userId, count) {
            unreadCounts[userId] = count;
            updateUserItemBadge(userId, count);
            updateModalUserBadge(userId, count);
            updateBrowserTitle();
        }

        function updateUserItemBadge(userId, count) {
            const userItem = document.querySelector(`[data-user-id="${userId}"]`);
            if (userItem) {
                let badge = userItem.querySelector('.unread-badge');
                if (count > 0) {
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'unread-badge';
                        userItem.appendChild(badge);
                    }
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.style.display = 'block';
                } else if (badge) {
                    badge.style.display = 'none';
                }
            }
        }

        function updateModalUserBadge(userId, count) {
            const modalUserItem = document.querySelector(`.modal-user-item[data-user-id="${userId}"]`);
            if (modalUserItem) {
                let badge = modalUserItem.querySelector('.unread-badge');
                if (count > 0) {
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'unread-badge';
                        modalUserItem.appendChild(badge);
                    }
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.style.display = 'block';
                } else if (badge) {
                    badge.style.display = 'none';
                }
            }
        }

        function updateBrowserTitle() {
            const totalUnread = Object.values(unreadCounts).reduce((sum, count) => sum + count, 0);
            if (totalUnread > 0) {
                document.title = `(${totalUnread}) 💬 ALVIN Chat`;
            } else {
                document.title = '💬 ALVIN Chat';
            }
        }

        function countUnreadMessages(userId) {
            if (!selectedUserId || selectedUserId !== userId) {
                const chatId = generateChatId(currentUser.uid, userId);
                const messagesRef = ref(database, `chats/${chatId}/messages`);
                
                get(messagesRef).then((snapshot) => {
                    let unreadCount = 0;
                    if (snapshot.exists()) {
                        snapshot.forEach((child) => {
                            const msg = child.val();
                            if (msg.senderId !== currentUser.uid && !msg.isRead) {
                                unreadCount++;
                            }
                        });
                    }
                    updateUnreadCount(userId, unreadCount);
                }).catch(err => console.error('Error counting unread:', err));
            } else {
                updateUnreadCount(userId, 0);
            }
        }

        // ===== PROFILE PHOTO UPLOAD =====
        document.getElementById('myAvatar').onclick = () => {
            document.getElementById('profileUpload').click();
        };

        document.getElementById('profileUpload').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ Ukuran file terlalu besar (max 5MB)');
                    return;
                }

                if (!file.type.startsWith('image/')) {
                    alert('❌ File harus berupa gambar');
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const base64Image = event.target.result;
                        document.getElementById('myAvatar').src = base64Image;
                        const userRef = ref(database, 'users/' + currentUser.uid);
                        await update(userRef, { photoURL: base64Image });
                        console.log('✅ Foto profil berhasil diperbarui');
                    } catch (error) {
                        console.error('❌ Error uploading photo:', error);
                        alert('❌ Gagal mengupload foto: ' + error.message);
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        // ===== AUTH CHECK =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log('✅ User logged in:', user.email);
                document.getElementById('authCheck').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                loadCurrentUser();
                loadAllUsers();
            } else {
                console.log('❌ User not logged in');
                document.getElementById('authCheck').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        function loadCurrentUser() {
            const userRef = ref(database, 'users/' + currentUser.uid);
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    currentUserName = userData.fullname || userData.email.split('@')[0];
                    document.getElementById('currentUserName').textContent = currentUserName;
                    if (userData.photoURL) {
                        document.getElementById('myAvatar').src = userData.photoURL;
                    }
                    console.log('✅ Current user loaded:', currentUserName);
                } else {
                    currentUserName = currentUser.displayName || currentUser.email.split('@')[0];
                    document.getElementById('currentUserName').textContent = currentUserName;
                    set(userRef, {
                        fullname: currentUserName,
                        email: currentUser.email,
                        createdAt: new Date().toISOString(),
                        photoURL: 'https://via.placeholder.com/40'
                    }).catch(err => console.error('Error saving user:', err));
                }
            }, (error) => {
                console.error('❌ Error loading current user:', error);
            });
        }

        function loadAllUsers() {
            const usersRef = ref(database, 'users');
            onValue(usersRef, (snapshot) => {
                allUsers = [];
                usersUnsubscribeList.forEach(unsub => unsub());
                usersUnsubscribeList = [];
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const userId = childSnapshot.key;
                        if (userId !== currentUser.uid) {
                            const userData = childSnapshot.val();
                            if (userData && userData.fullname) {
                                allUsers.push({
                                    uid: userId,
                                    name: userData.fullname,
                                    email: userData.email,
                                    photoURL: userData.photoURL || 'https://via.placeholder.com/40'
                                });
                                setupUnreadListener(userId);
                            }
                        }
                    });
                    console.log('✅ Users loaded:', allUsers.length);
                } else {
                    console.log('ℹ️ No users found in database');
                }
                displayUsers();
            }, (error) => {
                console.error('❌ Error loading users:', error);
                alert('Error memuat pengguna: ' + error.message);
            });
        }

        function setupUnreadListener(userId) {
            const chatId = generateChatId(currentUser.uid, userId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);
            
            const unsubscribe = onValue(messagesRef, (snapshot) => {
                let unreadCount = 0;
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.senderId !== currentUser.uid && !msg.isRead) {
                            unreadCount++;
                        }
                    });
                }
                updateUnreadCount(userId, unreadCount);
            }, (error) => {
                console.error(`Error listening to messages for ${userId}:`, error);
            });
            
            usersUnsubscribeList.push(unsubscribe);
        }

        function displayUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            if (allUsers.length === 0) {
                usersList.innerHTML = '<p class="no-users">Belum ada pengguna lain</p>';
                return;
            }

            allUsers.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => selectUser(user.uid, user.name, user.photoURL);
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p class="user-email">${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                usersList.appendChild(userElement);
            });
        }

        window.selectUser = function(userId, userName, photoURL) {
            selectedUserId = userId;
            document.getElementById('chatUserName').textContent = escapeHtml(userName);
            const chatUserAvatar = document.getElementById('chatUserAvatar');
            chatUserAvatar.innerHTML = '';
            const img = document.createElement('img');
            img.src = photoURL || 'https://via.placeholder.com/40';
            img.style.cssText = 'width: 100%; height: 100%; border-radius: 50%; object-fit: cover;';
            chatUserAvatar.appendChild(img);
            document.getElementById('userStatus').textContent = 'online';
            document.getElementById('welcomeMessage').style.display = 'none';
            document.getElementById('chatWindow').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '';
            loadMessages();
            markAsRead(generateChatId(currentUser.uid, selectedUserId));
            updateUnreadCount(userId, 0);
            updateBrowserTitle();
        };

        function loadMessages() {
            if (!selectedUserId || !currentUser) {
                console.error('❌ Missing selectedUserId or currentUser');
                return;
            }

            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }

            const chatId = generateChatId(currentUser.uid, selectedUserId);
            console.log('📧 Loading messages for chat:', chatId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);

            messagesUnsubscribe = onValue(messagesRef, (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';

                let messages = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        messages.push({
                            key: childSnapshot.key,
                            ...childSnapshot.val()
                        });
                    });
                }

                messages.sort((a, b) => a.timestamp - b.timestamp);

                if (messages.length === 0) {
                    messagesArea.innerHTML = '<p class="no-messages" style="text-align:center; color:#999; padding:2rem;">Belum ada pesan. Mulai percakapan!</p>';
                } else {
                    messages.forEach(msg => {
                        // Check if message is media
                        if (msg.isMedia && msg.mediaUrl) {
                            messagesArea.appendChild(createMediaMessageElement(msg));
                        } else {
                            // Regular text message
                            const messageElement = document.createElement('div');
                            messageElement.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                            
                            const timeStr = formatTime(msg.timestamp);
                            
                            let statusHtml = '';
                            if (msg.senderId === currentUser.uid) {
                                statusHtml = `<span class="message-status"><span class="tick ${msg.isRead ? 'read' : ''}">✔✔</span></span>`;
                            }
                            
                            messageElement.innerHTML = `
                                <div class="message-bubble">
                                    <p>${escapeHtml(msg.text)}</p>
                                    <span class="message-time">
                                        ${timeStr}
                                        ${statusHtml}
                                    </span>
                                </div>
                            `;
                            messagesArea.appendChild(messageElement);
                        }
                    });

                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }
            }, (error) => {
                console.error('❌ Error loading messages:', error);
                alert('Error memuat pesan: ' + error.message);
            });
        }

        window.sendMessage = function() {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();

            if (!text) {
                console.warn('⚠️ Message is empty');
                return;
            }

            if (!selectedUserId || !currentUser) {
                alert('❌ Error: User tidak terpilih');
                console.error('❌ Missing selectedUserId or currentUser');
                return;
            }

            const chatId = generateChatId(currentUser.uid, selectedUserId);
            const messagesRef = ref(database, `chats/${chatId}/messages`);

            const messageData = {
                senderId: currentUser.uid,
                senderName: currentUserName,
                text: text,
                timestamp: Date.now(),
                isRead: false,
                isMedia: false
            };

            push(messagesRef, messageData)
                .then(() => {
                    console.log('✅ Message sent successfully');
                    messageInput.value = '';
                    messageInput.focus();
                })
                .catch((error) => {
                    console.error('❌ Error sending message:', error);
                    alert('❌ Gagal mengirim pesan: ' + error.message);
                });
        };

        window.handleKeyPress = function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        };

        function markAsRead(chatId) {
            const messagesRef = ref(database, `chats/${chatId}/messages`);
            get(messagesRef).then((snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.senderId !== currentUser.uid && !msg.isRead) {
                            update(ref(database, `chats/${chatId}/messages/${child.key}`), { isRead: true });
                        }
                    });
                }
            }).catch(err => console.error('❌ Error marking as read:', err));
        }

        window.closeChat = function() {
            selectedUserId = null;
            if (messagesUnsubscribe) {
                messagesUnsubscribe();
                messagesUnsubscribe = null;
            }
            document.getElementById('chatWindow').style.display = 'none';
            document.getElementById('welcomeMessage').style.display = 'flex';
            document.getElementById('messageInput').value = '';
            cancelMediaPreview();
            updateBrowserTitle();
        };

        window.searchUsers = function() {
            const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            const filtered = allUsers.filter(user =>
                user.name.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                usersList.innerHTML = '<p class="no-users">Tidak ada pengguna yang cocok</p>';
                return;
            }

            filtered.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => selectUser(user.uid, user.name, user.photoURL);
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p class="user-email">${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                usersList.appendChild(userElement);
            });
        };

        window.openNewChat = function() {
            document.getElementById('newChatModal').classList.add('show');
            populateModalUsers();
        };

        window.closeNewChat = function() {
            document.getElementById('newChatModal').classList.remove('show');
            document.getElementById('modalSearchUsers').value = '';
        };

        function populateModalUsers() {
            const modalUsersList = document.getElementById('modalUsersList');
            modalUsersList.innerHTML = '';

            if (allUsers.length === 0) {
                modalUsersList.innerHTML = '<p class="no-users">Belum ada pengguna lain</p>';
                return;
            }

            allUsers.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'modal-user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => {
                    selectUser(user.uid, user.name, user.photoURL);
                    closeNewChat();
                };
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p>${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                modalUsersList.appendChild(userElement);
            });
        }

        window.searchModalUsers = function() {
            const searchTerm = document.getElementById('modalSearchUsers').value.toLowerCase();
            const modalUsersList = document.getElementById('modalUsersList');
            modalUsersList.innerHTML = '';

            const filtered = allUsers.filter(user =>
                user.name.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                modalUsersList.innerHTML = '<p class="no-users">Tidak ada pengguna yang cocok</p>';
                return;
            }

            filtered.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'modal-user-item';
                userElement.setAttribute('data-user-id', user.uid);
                userElement.onclick = () => {
                    selectUser(user.uid, user.name, user.photoURL);
                    closeNewChat();
                };
                
                const unreadCount = unreadCounts[user.uid] || 0;
                const badgeHtml = unreadCount > 0 
                    ? `<span class="unread-badge" style="display: block;">${unreadCount > 99 ? '99+' : unreadCount}</span>` 
                    : `<span class="unread-badge" style="display: none;"></span>`;
                
                userElement.innerHTML = `
                    <img src="${user.photoURL}" class="user-item-avatar" alt="${escapeHtml(user.name)}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;">
                    <div class="user-item-info">
                        <h4>${escapeHtml(user.name)}</h4>
                        <p>${escapeHtml(user.email)}</p>
                    </div>
                    ${badgeHtml}
                `;
                modalUsersList.appendChild(userElement);
            });
        };

        window.logoutChat = function() {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                if (messagesUnsubscribe) {
                    messagesUnsubscribe();
                }
                usersUnsubscribeList.forEach(unsub => unsub());
                usersUnsubscribeList = [];
                
                signOut(auth).then(() => {
                    window.location.href = 'index.html';
                }).catch((error) => {
                    console.error('❌ Error saat logout:', error);
                    alert('❌ Error saat logout: ' + error.message);
                });
            }
        };

        window.onclick = function(event) {
            const modal = document.getElementById('newChatModal');
            if (event.target === modal) {
                closeNewChat();
            }
        };

    </script>
</body>
</html>
